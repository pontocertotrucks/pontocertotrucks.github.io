    <script>
      // Applies the dark/light class on <html> *before* any CSS or Angular
      // bundle runs — avoids the white flash and survives every framework
      // class mutation (Ionic appends `ion-ce md plt-*` later; classList.add
      // is additive). Default to dark: the RN app is dark-only and some
      // mobile browsers (Chrome Android) don't report `prefers-color-scheme:
      // dark` unless the user explicitly turns on "Dark theme for web
      // content", even when the OS is in dark mode.
      (function () {
        try {
          var saved = localStorage.getItem('CapacitorStorage.pc:theme-preference:v1');
          var dark;
          if (saved === 'dark') dark = true;
          else if (saved === 'light') dark = false;
          else {
            var mq = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)');
            dark = !(mq && mq.matches); // default to dark unless the browser explicitly reports light
          }
          document.documentElement.classList.add(dark ? 'pc-theme-dark' : 'pc-theme-light');
        } catch (e) {
          document.documentElement.classList.add('pc-theme-dark');
        }
      })();
    </script>
    <style>
      /* In-app boot splash. Sits in static HTML so it paints on the very
         first frame (before Angular bootstraps + the appInitializer finishes
         hydrating session/trucks/time-entries). Removed in app.config.ts at
         the same point we hide the native Capacitor SplashScreen. */
      #pc-app-splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        background: #ffffff;
        color: #111827;
        transition: opacity 220ms ease;
      }
      html.pc-theme-dark #pc-app-splash {
        background: #0b0f17;
        color: #f9fafb;
      }
      #pc-app-splash.is-leaving {
        opacity: 0;
        pointer-events: none;
      }
      #pc-app-splash .pc-app-splash__brand {
        display: flex;
        align-items: center;
        gap: 12px;
        font-family:
          'Roboto',
          system-ui,
          -apple-system,
          sans-serif;
        letter-spacing: 0.5px;
      }
      #pc-app-splash .pc-app-splash__brand img {
        width: 56px;
        height: 56px;
        flex-shrink: 0;
      }
      #pc-app-splash .pc-app-splash__brand-text {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 2px;
        line-height: 1;
      }
      #pc-app-splash .pc-app-splash__brand-row {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 1.85rem;
        font-weight: 700;
        text-transform: uppercase;
      }
      #pc-app-splash .pc-app-splash__accent {
        color: #0c99bd;
      }
      #pc-app-splash .pc-app-splash__tagline {
        font-size: 0.95rem;
        font-weight: 400;
        font-style: italic;
        letter-spacing: 0.3px;
        color: #4b5563;
      }
      html.pc-theme-dark #pc-app-splash .pc-app-splash__tagline {
        color: #9ca3af;
      }
      #pc-app-splash .pc-app-splash__spinner {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: 3px solid rgba(12, 153, 189, 0.2);
        border-top-color: #0c99bd;
        animation: pc-app-splash-spin 0.85s linear infinite;
      }
      @keyframes pc-app-splash-spin {
        to {
          transform: rotate(360deg);
        }
      }
